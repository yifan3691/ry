# 工作流名称，会显示在 GitHub Actions 页面中
name: CI

# 同一分支有新提交时，自动取消旧的运行，避免排队浪费时间
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 统一维护服务器部署目录，避免重复写死路径
env:
  FRONTEND_DEPLOY_PATH: /opt/1panel/www/sites/ry/index
  BACKEND_DEPLOY_PATH: /home/ubuntu/project/ry/boot

# 配置工作流触发时机
on:
  # 推送到 master 或 main 分支时自动执行
  push:
    branches:
      - master
      - main
  # 针对 master 或 main 分支发起拉取请求时自动执行
  pull_request:
    branches:
      - master
      - main
  # 支持在 GitHub Actions 页面手动点击运行
  workflow_dispatch:

# 定义具体要执行的任务
jobs:
  # 先判断本次提交影响了前端还是后端，避免两边都全量执行
  changes:
    # 任务显示名称
    name: 变更检测
    # 使用 GitHub 提供的 Ubuntu 运行环境
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      # 拉取仓库代码到 Actions 运行器
      - name: 检出代码
        uses: actions/checkout@v4

      # 根据改动路径判断需要跑哪些任务
      - name: 检测改动范围
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'pom.xml'
              - 'ruoyi-admin/**'
              - 'ruoyi-common/**'
              - 'ruoyi-framework/**'
              - 'ruoyi-generator/**'
              - 'ruoyi-quartz/**'
              - 'ruoyi-system/**'
              - 'ods-business/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'ruoyi-vue/**'
              - '.github/workflows/ci.yml'

  # 后端构建任务
  backend:
    # 任务显示名称
    name: 后端构建
    # 依赖变更检测结果
    needs: changes
    # 只有后端相关改动，或手动触发时才执行
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    # 使用 GitHub 提供的 Ubuntu 运行环境
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库代码到 Actions 运行器
      - name: 检出代码
        uses: actions/checkout@v4

      # 安装并配置 JDK 8，同时启用 Maven 依赖缓存
      - name: 设置 JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # GitHub Actions 每次都是全新环境，不需要先 clean；开启并行编译可缩短总时长
      - name: Maven 打包
        run: mvn -B -T 1C -DskipTests package

      # 仅在 push 或手动触发时准备服务器目录，PR 只做构建校验
      - name: 准备后端服务器目录
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            mkdir -p ${{ env.BACKEND_DEPLOY_PATH }}
            find ${{ env.BACKEND_DEPLOY_PATH }} -maxdepth 1 -type f -name '*.jar' -delete

      # 直接上传最终 jar 包到服务器，省去 artifact 中转
      - name: 上传后端到服务器
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: ruoyi-admin/target/ruoyi-admin.jar
          target: ${{ env.BACKEND_DEPLOY_PATH }}
          strip_components: 2
          overwrite: true

  # 前端构建任务
  frontend:
    # 任务显示名称
    name: 前端构建
    # 依赖变更检测结果
    needs: changes
    # 只有前端相关改动，或手动触发时才执行
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    # 使用 GitHub 提供的 Ubuntu 运行环境
    runs-on: ubuntu-latest

    # 将后续 run 命令的默认执行目录切换到前端项目目录
    defaults:
      run:
        working-directory: ruoyi-vue

    steps:
      # 拉取仓库代码到 Actions 运行器
      - name: 检出代码
        uses: actions/checkout@v4

      # 安装并配置 Node.js 16 环境
      - name: 设置 Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      # 缓存 npm 下载的依赖，加快后续安装速度
      - name: 缓存 npm 依赖
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('ruoyi-vue/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # 关闭审计和进度条，减少无意义等待与日志输出
      - name: 安装前端依赖
        run: npm install --prefer-offline --no-audit --progress=false

      # 执行前端生产环境打包
      - name: 构建前端
        run: npm run build:prod

      # 仅在 push 或手动触发时准备服务器目录，PR 只做构建校验
      - name: 准备前端服务器目录
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            mkdir -p ${{ env.FRONTEND_DEPLOY_PATH }}
            find ${{ env.FRONTEND_DEPLOY_PATH }} -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      # 直接上传前端 dist 内容到服务器，省去 artifact 中转
      - name: 上传前端到服务器
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: ruoyi-vue/dist/*
          target: ${{ env.FRONTEND_DEPLOY_PATH }}
          strip_components: 2
          overwrite: true

      # 如果你服务器上的前端目录有额外处理需求，可以在这里补充命令

