# 工作流名称，会显示在 GitHub Actions 页面中
name: CI

# 配置工作流触发时机
on:
  # 推送到 master 或 main 分支时自动执行
  push:
    branches:
      - master
      - main
  # 针对 master 或 main 分支发起拉取请求时自动执行
  pull_request:
    branches:
      - master
      - main
  # 支持在 GitHub Actions 页面手动点击运行
  workflow_dispatch:

# 定义具体要执行的任务
jobs:
  # 后端构建任务
  backend:
    # 任务显示名称
    name: 后端构建
    # 使用 GitHub 提供的 Ubuntu 运行环境
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库代码到 Actions 运行器
      - name: 检出代码
        uses: actions/checkout@v4

      # 安装并配置 JDK 8，同时启用 Maven 依赖缓存
      - name: 设置 JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      # 执行 Maven 打包，跳过测试以加快构建速度
      - name: Maven 打包
        run: mvn -B clean package -DskipTests

      # 上传后端构建产物，方便在 Actions 页面下载
      - name: 上传后端产物
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifacts
          path: |
            ruoyi-admin/target/*.war
            ruoyi-framework/target/*.jar
            ruoyi-system/target/*.jar
            ruoyi-quartz/target/*.jar
            ruoyi-generator/target/*.jar
            ruoyi-common/target/*.jar
            ods-business/target/*.jar
          if-no-files-found: error

  # 前端构建任务
  frontend:
    # 任务显示名称
    name: 前端构建
    # 使用 GitHub 提供的 Ubuntu 运行环境
    runs-on: ubuntu-latest

    # 将后续 run 命令的默认执行目录切换到前端项目目录
    defaults:
      run:
        working-directory: ruoyi-vue

    steps:
      # 拉取仓库代码到 Actions 运行器
      - name: 检出代码
        uses: actions/checkout@v4

      # 安装并配置 Node.js 16 环境
      - name: 设置 Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      # 缓存 npm 下载的依赖，加快后续安装速度
      - name: 缓存 npm 依赖
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('ruoyi-vue/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # 安装前端依赖包
      - name: 安装前端依赖
        run: npm install

      # 执行前端生产环境打包
      - name: 构建前端
        run: npm run build:prod

      # 上传前端 dist 目录，方便在 Actions 页面下载
      - name: 上传前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ruoyi-vue/dist
          if-no-files-found: error
